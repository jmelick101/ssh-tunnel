name: SSH Tunnel
on: push

jobs:
  deploy:
    name: Set up tunnel
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout
      uses: actions/checkout@v2
      
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PUBLIC_KEY }}" >> ~/.ssh/authorized_keys
        chmod 700 ~/.ssh
        chmod 600 ~/.ssh/authorized_keys
        sudo systemctl start ssh
        
    - name: Setup Serveo tunnel
      run: |
        ssh-keyscan serveo.net >> ~/.ssh/known_hosts
        timeout 1h ssh -o StrictHostKeyChecking=no -R 0:localhost:22 serveo.net &
        sleep 5
        echo "Tunnel started. Check logs above for public URL."
